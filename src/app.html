<!doctype html>
<html lang="es">
	<head>
		<meta charset="utf-8" />
		<!-- Unregister stale service workers on local dev ASAP (old sw.js broke Supabase PATCH/CORS). -->
		<script>
			(function () {
				try {
					var h = location.hostname;
					if (h !== 'localhost' && h !== '127.0.0.1' && !h.endsWith('.local')) return;
					if (!navigator.serviceWorker) return;
					navigator.serviceWorker.getRegistrations().then(function (regs) {
						regs.forEach(function (r) {
							r.unregister();
						});
					});
				} catch (e) {}
			})();
		</script>
		<link rel="icon" href="%sveltekit.assets%/favicon-light.png" type="image/png" id="luxe-favicon" />
		<link rel="apple-touch-icon" href="%sveltekit.assets%/apple-touch-icon.png" />
		<link rel="manifest" href="%sveltekit.assets%/manifest.json" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<script>
			(function () {
				try {
					var t = localStorage.getItem('luxe-theme');
					var d =
						t === 'dark' ||
						(!t && window.matchMedia('(prefers-color-scheme: dark)').matches);
					document.documentElement.setAttribute('data-theme', d ? 'dark' : 'light');
					document.documentElement.style.colorScheme = d ? 'dark' : 'light';
				} catch (e) {}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="tap">
		<div style="display: contents">%sveltekit.body%</div> 
	</body>
</html>
